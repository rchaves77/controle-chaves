name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Criar arquivo env.js dinamicamente
        run: |
          echo "${{ secrets.FIREBASE_CONFIG }}" > env.js

      - name: Liberar o arquivo para o Deploy
        run: rm -f .gitignore # Essa linha mágica remove a restrição apenas na hora de publicar!

      - name: Deploy para GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . 
          branch: gh-pages
          clean: true