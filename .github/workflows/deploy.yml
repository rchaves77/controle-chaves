name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write  # ESSA LINHA RESOLVE O ERRO 128 (Dá permissão de escrita)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v4 # Atualizado para v4

      - name: Criar arquivo env.js dinamicamente
        run: |
          echo "${{ secrets.FIREBASE_CONFIG }}" > env.js

      - name: Deploy para GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . 
          branch: gh-pages