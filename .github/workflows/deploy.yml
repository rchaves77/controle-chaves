name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Criar arquivo env.js preservando formatação
        run: |
          cat << 'EOF' > env.js
          ${{ secrets.FIREBASE_CONFIG }}
          EOF

      - name: Liberar o arquivo para o Deploy
        run: rm -f .gitignore || true

      - name: Deploy para GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . 
          branch: gh-pages
          clean: true