<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mapa de Chaves - Estácio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
    <nav class="bg-blue-900 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h2 class="font-bold tracking-tighter text-sm uppercase">Clínica Odonto Estácio</h2>
            <div class="flex gap-2">
                <button id="btnCobranca" onclick="enviarMassa()" class="hidden bg-green-500 hover:bg-green-600 px-3 py-1 rounded text-[10px] font-bold uppercase shadow">Cobrança Semestre</button>
                <button onclick="auth.signOut().then(()=>window.location.href='index.html')" class="bg-red-500 px-3 py-1 rounded text-[10px] font-bold uppercase">Sair</button>
            </div>
        </div>
    </nav>
<div class="max-w-6xl mx-auto px-4 md:px-8 mt-6">
    <p id="boasVindas" class="text-blue-900 font-medium text-sm md:text-base border-l-4 border-blue-700 pl-3 italic">
        Carregando acesso...
    </p>
</div>

    <main id="grades" class="max-w-6xl mx-auto p-4 md:p-8 grid gap-10 flex-grow w-full">
        </main>

    <footer class="p-6 text-center text-gray-300 text-[10px] font-bold uppercase tracking-[0.2em]">
        Desenvolvido por SerClin Tech
    </footer>

    <script src="config.js"></script>
    <script>
        // Trava de Segurança e Visibilidade do Botão
        auth.onAuthStateChanged(user => { 
            if(!user) {
                window.location.href="index.html";
            } else {
                // Se o e-mail NÃO termina com @alunos, ele é professor/admin -> mostra o botão
                if (!user.email.endsWith('@alunos.estacio.br')) {
                    document.getElementById('btnCobranca').classList.remove('hidden');
                }
            }
        });

        const blocos = ['C1', 'C2', 'C3'];
        
        db.ref('armarios').on('value', snap => {
            const dados = snap.val() || {};
            const container = document.getElementById('grades');
            container.innerHTML = '';

            blocos.forEach(bloco => {
                let html = `<div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                    <h3 class="text-lg font-black text-blue-900 mb-6 border-b pb-2 text-center uppercase tracking-widest italic">Bloco ${bloco}</h3>
                    <div class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-3">`;
                
                for(let i=1; i<=24; i++) {
                    const id = `${bloco}-${i}`;
                    const ocupado = dados[id];
                    const cor = ocupado ? 'bg-red-500 ring-2 ring-red-100' : 'bg-green-500 hover:bg-green-600';
                    html += `<div onclick="gerenciar('${id}', ${JSON.stringify(ocupado)})" 
                             class="${cor} p-3 text-white rounded-lg text-sm font-black cursor-pointer hover:scale-105 transition-all text-center shadow-sm">
                             ${i}
                             </div>`;
                }
                container.innerHTML += html + `</div></div>`;
            });
        });

        function gerenciar(id, ocupado) {
            if(ocupado) {
                if(confirm(`Armário ${id}\nAluno: ${ocupado.nome}\nData: ${ocupado.data}\n\nLiberar agora?`)) {
                    db.ref('armarios/'+id).remove();
                }
            } else {
                const nome = prompt(`Retirada Chave ${id}\nNome do Aluno:`);
                let whatsRaw = prompt(`WhatsApp do Aluno (com DDD):`);
                
                if(nome && whatsRaw) {
                    let whatsLimpo = whatsRaw.replace(/\D/g, ''); 
                    if (whatsLimpo.length <= 11) whatsLimpo = '55' + whatsLimpo;

                    db.ref('armarios/'+id).set({
                        nome: nome,
                        whats: whatsLimpo,
                        data: new Date().toLocaleDateString('pt-BR')
                    });
                }
            }
        }

        function enviarMassa() {
            db.ref('armarios').once('value', snap => {
                const pendentes = snap.val();
                if(!pendentes) return alert("Nada ocupado.");
                
                if(confirm("Cobrar todos os alunos agora?")) {
                    Object.entries(pendentes).forEach(([id, info]) => {
                        const msg = `Olá ${info.nome}, clínica Estácio Unimeta. Favor devolver a chave ${id} para fechamento do semestre.`;
                        window.open(`https://api.whatsapp.com/send?phone=${info.whats}&text=${encodeURIComponent(msg)}`, '_blank');
                    });
                }
            });
        }
    </script>
</body>
</html>
