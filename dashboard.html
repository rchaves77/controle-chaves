<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mapa de Chaves - Estácio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col font-sans">

    <div id="modalCobranca" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full shadow-2xl overflow-hidden">
            <div class="bg-blue-900 p-4 flex justify-between items-center text-white text-sm font-bold uppercase italic">
                <span>Fila de Cobrança Semestral</span>
                <button onclick="document.getElementById('modalCobranca').classList.add('hidden')" class="text-xl">&times;</button>
            </div>
            <div id="listaDevedores" class="max-h-96 overflow-y-auto p-4 space-y-3 bg-slate-50 text-gray-700"></div>
        </div>
    </div>

    <nav class="bg-blue-900 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h2 class="font-bold text-sm uppercase italic tracking-tighter">Clínica Odonto Estácio</h2>
            <div class="flex gap-2">
                <button id="btnAdmin" onclick="abrirModalCobranca()" class="hidden bg-green-500 hover:bg-green-600 px-3 py-1 rounded text-[10px] font-bold uppercase shadow transition-all italic">Cobrança Semestre</button>
                <button onclick="auth.signOut().then(()=>window.location.href='index.html')" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-[10px] font-bold uppercase shadow transition-all">Sair</button>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 md:px-8 mt-6 w-full text-blue-900 font-medium text-sm">
        <div class="border-l-4 border-blue-700 pl-3">
            <p id="boasVindas" class="italic">Verificando usuário...</p>
        </div>
    </div>

    <main id="grades" class="max-w-6xl mx-auto p-4 md:p-8 grid gap-10 flex-grow w-full"></main>

    <footer class="p-6 text-center text-gray-400 text-[10px] font-bold uppercase tracking-[0.2em]">Desenvolvido por SerClin Tech</footer>

    <script src="config.js"></script>
    <script>
        let eAdmin = false;

        auth.onAuthStateChanged(user => { 
            if(!user) {
                window.location.href="index.html";
            } else {
                const email = user.email.toLowerCase();
                const saudacao = document.getElementById('boasVindas');

                // BUSCA O NOME REAL SALVO NO CADASTRO
                db.ref('usuarios_termos/' + user.uid).once('value', snap => {
                    let nomeFinal = "";
                    if (snap.exists() && snap.val().nome) {
                        nomeFinal = snap.val().nome.toUpperCase();
                    } else {
                        // Caso seja um usuário antigo sem nome, usa o CPF (antes do @)
                        nomeFinal = email.split('@')[0].toUpperCase();
                    }
                    saudacao.innerHTML = `Olá, <b>${nomeFinal}</b>. Bem-vindo ao sistema de chaves.`;
                });

                // TRAVA DE SEGURANÇA (Bloqueia edição para @alunos e @professores)
                if (!email.endsWith('@alunos.estacio.br') && !email.endsWith('@professores.estacio.br')) {
                    eAdmin = true;
                    document.getElementById('btnAdmin').classList.remove('hidden');
                }
                carregarMapa();
            }
        });

        function carregarMapa() {
            db.ref('armarios').on('value', snap => {
                const dados = snap.val() || {};
                const container = document.getElementById('grades');
                container.innerHTML = '';
                ['C1', 'C2', 'C3'].forEach(bloco => {
                    let html = `<div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 shadow-md">
                        <h3 class="text-lg font-black text-blue-900 mb-6 border-b pb-2 text-center uppercase italic">Bloco ${bloco}</h3>
                        <div class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-3">`;
                    for(let i=1; i<=24; i++) {
                        const id = `${bloco}-${i}`;
                        const ocupado = dados[id];
                        const cor = ocupado ? 'bg-red-500 ring-2 ring-red-100 shadow-inner' : 'bg-green-500 hover:bg-green-600';
                        
                        const cursor = eAdmin ? 'cursor-pointer hover:scale-105' : 'cursor-default opacity-90';
                        const clickFunc = eAdmin ? `onclick="gerenciar('${id}', ${JSON.stringify(ocupado)})"` : '';

                        html += `<div ${clickFunc} class="${cor} ${cursor} p-3 text-white rounded-lg text-sm font-black transition-all text-center shadow-sm">${i}</div>`;
                    }
                    container.innerHTML += html + `</div></div>`;
                });
            });
        }

        function gerenciar(id, ocupado) {
            if(!eAdmin) return;
            if(ocupado) {
                if(confirm(`Devolver chave ${id} de ${ocupado.nome}?`)) db.ref('armarios/'+id).remove();
            } else {
                const n = prompt(`Retirada Chave ${id}\nNome do Aluno:`);
                let w = prompt(`WhatsApp do Aluno (com DDD):`);
                if(n && w) {
                    w = w.replace(/\D/g, '');
                    if (w.length <= 11) w = '55' + w;
                    db.ref('armarios/'+id).set({ nome: n, whats: w, data: new Date().toLocaleDateString('pt-BR') });
                }
            }
        }

        function abrirModalCobranca() {
            if(!eAdmin) return;
            db.ref('armarios').once('value', snap => {
                const pendentes = snap.val();
                if(!pendentes) return alert("Nenhuma chave ocupada.");
                const lista = document.getElementById('listaDevedores');
                lista.innerHTML = '';
                Object.entries(pendentes).forEach(([id, info]) => {
                    const div = document.createElement('div');
                    div.className = "flex justify-between items-center p-3 bg-white border rounded-xl mb-2 shadow-sm";
                    div.innerHTML = `<div class="text-[10px] font-bold text-blue-900 uppercase">#${id} - ${info.nome}</div>
                        <button onclick="window.open('https://api.whatsapp.com/send?phone=${info.whats}&text=Ola ${info.nome}, clínica Estácio. Favor devolver a chave ${id}.', '_blank'); this.innerText='OK ✓'; this.className='bg-gray-200 px-3 py-1 rounded text-[8px] font-bold text-gray-400';" 
                        class="bg-green-500 text-white px-3 py-1 rounded-full text-[8px] font-bold shadow-sm hover:bg-green-600 transition-colors uppercase italic">Cobrar</button>`;
                    lista.appendChild(div);
                });
                document.getElementById('modalCobranca').classList.remove('hidden');
            });
        }
    </script>
</body>
</html>
