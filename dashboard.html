<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mapa de Chaves - Estácio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col font-sans">

    <div id="modalCobranca" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full shadow-2xl overflow-hidden">
            <div class="bg-blue-900 p-4 flex justify-between items-center text-white">
                <h2 class="font-bold uppercase text-sm italic">Fila de Cobrança Semestral</h2>
                <button onclick="document.getElementById('modalCobranca').classList.add('hidden')" class="font-bold hover:text-red-400">X</button>
            </div>
            <div id="listaDevedores" class="max-h-96 overflow-y-auto p-4 space-y-3 bg-slate-50 text-gray-700">
                </div>
        </div>
    </div>

    <nav class="bg-blue-900 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h2 class="font-bold text-sm uppercase italic tracking-tighter">Clínica Odonto Estácio</h2>
            <div class="flex gap-2">
                <button id="btnCobranca" onclick="abrirModalCobranca()" class="hidden bg-green-500 hover:bg-green-600 px-3 py-1 rounded text-[10px] font-bold uppercase shadow transition-all">Cobrança Semestre</button>
                <button onclick="auth.signOut().then(()=>window.location.href='index.html')" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-[10px] font-bold uppercase shadow transition-all">Sair</button>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 md:px-8 mt-6 w-full text-blue-900 font-medium text-sm">
        <span id="boasVindas" class="border-l-4 border-blue-700 pl-3 italic">Verificando acesso...</span>
    </div>

    <main id="grades" class="max-w-6xl mx-auto p-4 md:p-8 grid gap-10 flex-grow w-full"></main>

    <footer class="p-6 text-center text-gray-400 text-[10px] font-bold uppercase tracking-[0.2em]">
        Desenvolvido por SerClin Tech
    </footer>

    <script src="config.js"></script>
    <script>
        // SEGURANÇA E IDENTIFICAÇÃO
        auth.onAuthStateChanged(user => { 
            if(!user) {
                window.location.href="index.html";
            } else {
                const nome = user.email.split('@')[0].split('.')[0].toUpperCase();
                document.getElementById('boasVindas').innerHTML = `Olá, <b>${nome}</b>. Bem-vindo ao Controle SerClin.`;
                
                // Só mostra botão de cobrança se não for aluno
                if (!user.email.endsWith('@alunos.estacio.br')) {
                    document.getElementById('btnCobranca').classList.remove('hidden');
                }
                carregarMapa();
            }
        });

        // CARREGAMENTO DOS BLOCOS
        function carregarMapa() {
            db.ref('armarios').on('value', snap => {
                const dados = snap.val() || {};
                const container = document.getElementById('grades');
                container.innerHTML = '';
                
                ['C1', 'C2', 'C3'].forEach(bloco => {
                    let html = `<div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                        <h3 class="text-lg font-black text-blue-900 mb-6 border-b pb-2 text-center italic uppercase">Bloco ${bloco}</h3>
                        <div class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-3">`;
                    
                    for(let i=1; i<=24; i++) {
                        const id = `${bloco}-${i}`;
                        const ocupado = dados[id];
                        const cor = ocupado ? 'bg-red-500 ring-2 ring-red-100' : 'bg-green-500 hover:bg-green-600';
                        html += `<div onclick="gerenciar('${id}', ${JSON.stringify(ocupado)})" 
                                 class="${cor} p-3 text-white rounded-lg text-sm font-black cursor-pointer text-center hover:scale-105 transition-all shadow-sm">
                                 ${i}
                                 </div>`;
                    }
                    container.innerHTML += html + `</div></div>`;
                });
            });
        }

        // GESTÃO DE CHAVES (RETIRADA E DEVOLUÇÃO)
        function gerenciar(id, ocupado) {
            if(ocupado) {
                if(confirm(`Devolver chave ${id} de ${ocupado.nome}?\n\nIsso liberará o armário para a lista.`)) {
                    db.ref('armarios/'+id).remove();
                }
            } else {
                const n = prompt(`Retirada Chave ${id}\nNome do Aluno:`);
                let w = prompt(`WhatsApp do Aluno (com DDD):`);
                if(n && w) {
                    w = w.replace(/\D/g, ''); // Limpa o número
                    if (w.length <= 11) w = '55' + w;
                    db.ref('armarios/'+id).set({ 
                        nome: n, 
                        whats: w, 
                        data: new Date().toLocaleDateString('pt-BR') 
                    });
                }
            }
        }

        // MODAL DE COBRANÇA
        function abrirModalCobranca() {
            db.ref('armarios').once('value', snap => {
                const pendentes = snap.val();
                if(!pendentes) return alert("Nenhum armário ocupado no momento.");
                
                const lista = document.getElementById('listaDevedores');
                lista.innerHTML = '';
                
                Object.entries(pendentes).forEach(([id, info]) => {
                    const div = document.createElement('div');
                    div.className = "flex justify-between items-center p-3 bg-white border rounded-xl shadow-sm mb-2";
                    div.innerHTML = `
                        <div class="text-[10px]">
                            <p class="font-black text-blue-900 uppercase">${id} - ${info.nome}</p>
                            <p class="text-gray-400">Desde: ${info.data}</p>
                        </div>
                        <button onclick="window.open('https://api.whatsapp.com/send?phone=${info.whats}&text=Olá ${info.nome}, aqui é da Clínica Estácio. Favor devolver a chave ${id} para fechamento do semestre.', '_blank'); this.innerText='COBRADO ✓'; this.className='bg-gray-100 text-gray-400 px-2 py-1 rounded text-[8px] font-bold cursor-default';" 
                                class="bg-green-500 text-white px-3 py-1 rounded-full text-[8px] font-bold hover:bg-green-600 transition-all shadow">
                            COBRAR
                        </button>`;
                    lista.appendChild(div);
                });
                document.getElementById('modalCobranca').classList.remove('hidden');
            });
        }
    </script>
</body>
</html>
